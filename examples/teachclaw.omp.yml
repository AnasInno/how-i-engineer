# Public-safe shape of the checked-in TeachClaw OMP configuration.
includeWorkspaceTree: false

modelRoles:
  default: openai-codex/gpt-5.6-sol:low
  plan: openai-codex/gpt-5.6-sol:xhigh
  task: openai-codex/gpt-5.6-luna:xhigh
  slow: openai-codex/gpt-5.6-sol:xhigh
  commit: openai-codex/gpt-5.6-luna:low
  tiny: openai-codex/gpt-5.6-luna:low

magicKeywords:
  enabled: true
  workflow: true

task:
  # The TeachClaw worktree and lane controller own isolation.
  isolation:
    mode: none
  eager: preferred
  batch: true
  maxConcurrency: 8
